version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: [ "*" ]
    ignore:
      - dependency-name: "yiisoft/*"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      composer-dev-dependencies:
        dependency-type: "development"
    versioning-strategy: "widen"
